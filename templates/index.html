{% extends 'base.html' %}

{% block content %}

<div class="row">
    {% for v in vulnerabilities %}
    <div class="col-12 col-md-6 mb-3">
        <div class="card p-3">
            <h5>OWSAP Rank: {{ v.owasp_rank }}</h5>
            <p>{{ v.vul_name }}</p>
            <a href="/incidents/{{ v.id }}" class="btn btn-primary">View</a>
            
            
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
